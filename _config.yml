# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole site, values
# which you are expected to set up once and rarely edit after that.

# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: My Links
email: your-email@example.com
description: >- # this means to ignore newlines until "baseurl:"
  Hi, I'm an artist, or a musician, or a crafts person, a programmer, an
  entertainer, or a machinist, or a teacher, or a healer, or any of a 
  myriad of other things. Instagram doesn't let me put links in my posts
  so here's links to my work.
url: "" # the base hostname & protocol for your site, e.g. http://example.com

# the following are the links you would have had put in your link tree, 
# you need to enter the full url, including https, if you don't have one of
# these links, delete the line with it 
links: 
  homepage: https://example.com/
  shop: https://shop.example.com/
  instagram: https://instagram.com/example/
  facebook: https://facebook.com/example/
  twitter: https:/x.com/example/
  threads: https:/threads.net/example/
  fediverse: https://mastodon.social/example/
  line:  https://lin.ee/example/
  spotify: https://open.spotify.com/artist/{spotify artist URI}
  bandcamp: https://example.bandcamp.com/

# you can set an optional style of the page by un-commenting
# (removing the '#') from one (and one only) of these lines
# style: round

# Build settings
plugins:
  - jekyll-seo-tag

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - LICENSE
  - README.md 
  - .gitignore
